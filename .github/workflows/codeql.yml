name: CodeQL

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**/*.java'
      - '**/*.kt'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    if: github.event.pull_request.draft == false
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: NKK-IT-Utvikling/nkk-actions/.github/workflows/codeql.yml@main
    secrets: inherit
